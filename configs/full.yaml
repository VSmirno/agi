# SNKS Full Configuration
# For AMD GPU with 92 GB VRAM — maximum scale

device: auto

daf:
  num_nodes: 500000
  state_dim: 8
  avg_degree: 50
  dt: 0.0001
  noise_sigma: 0.01
  oscillator_model: fhn
  fhn_a: 0.7
  fhn_b: 0.8
  fhn_tau: 12.5
  fhn_I_base: 0.5
  coupling_strength: 0.1
  stdp_a_plus: 0.01
  stdp_a_minus: 0.012
  stdp_tau_plus: 0.020
  stdp_tau_minus: 0.020
  stdp_w_max: 1.0
  stdp_w_min: 0.0
  homeostasis_target: 0.05
  homeostasis_tau: 1.0
  homeostasis_lambda: 0.001
  structural_interval: 1000

encoder:
  image_size: 64
  n_orientations: 8
  n_scales: 4
  n_phases: 4
  sdr_size: 4096
  sdr_sparsity: 0.04

dcam:
  hac_dim: 4096
  lsh_n_tables: 32
  lsh_n_bits: 16
  max_nodes: 1000000
  episodic_capacity: 100000
  consolidation_interval: 100

pipeline:
  steps_per_cycle: 100
