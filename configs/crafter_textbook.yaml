# Crafter Textbook — structured declarative facts
# Stage 77a: rewritten to structured YAML (Stage 71 was regex-parsed strings)
#
# Format: each rule is a dict with either `action` (agent-triggered) or
# `passive` (per-tick in simulation). See
# docs/superpowers/specs/2026-04-10-stage77a-conceptstore-forward-sim-design.md

domain: crafter

vocabulary:
  # Visible objects (visually groundable)
  - { id: tree,     category: resource }
  - { id: stone,    category: resource }
  - { id: coal,     category: resource }
  - { id: iron,     category: resource }
  - { id: table,    category: crafted }
  - { id: empty,    category: terrain }
  - { id: zombie,   category: enemy, dangerous: true }
  - { id: skeleton, category: enemy, dangerous: true }
  # Survival resources
  - { id: water, category: resource }
  - { id: cow,   category: resource }
  # Inventory items (text grounding only)
  - { id: wood,           category: item }
  - { id: stone_item,     category: item }
  - { id: coal_item,      category: item }
  - { id: iron_item,      category: item }
  - { id: wood_pickaxe,   category: tool }
  - { id: stone_pickaxe,  category: tool }
  - { id: wood_sword,     category: weapon }

body:
  prior_strength: 20
  variables:
    # `vital: true` means this variable hitting reference_min = death.
    # Non-vital vars can hit their min without terminating the episode
    # (e.g., food=0 is starvation, not instant death — health drops from it).
    - { name: health, initial: 9, reference_min: 0, reference_max: 9, vital: true }
    - { name: food,   initial: 9, reference_min: 0, reference_max: 9 }
    - { name: drink,  initial: 9, reference_min: 0, reference_max: 9 }
    - { name: energy, initial: 9, reference_min: 0, reference_max: 9 }

rules:
  # ===== ACTION-TRIGGERED: gathering =====

  - action: do
    target: tree
    effect: { inventory: { wood: +1 } }

  - action: do
    target: stone
    requires: { wood_pickaxe: 1 }
    effect: { inventory: { stone_item: +1 } }

  - action: do
    target: coal
    requires: { wood_pickaxe: 1 }
    effect: { inventory: { coal_item: +1 } }

  - action: do
    target: iron
    requires: { stone_pickaxe: 1 }
    effect: { inventory: { iron_item: +1 } }

  # ===== ACTION-TRIGGERED: consumption (body delta directly) =====

  - action: do
    target: cow
    effect: { body: { food: +5 } }

  - action: do
    target: water
    effect: { body: { drink: +5 } }

  # ===== ACTION-TRIGGERED: combat (scene_remove) =====

  - action: do
    target: zombie
    requires: { wood_sword: 1 }
    effect: { remove_entity: zombie }

  - action: do
    target: skeleton
    requires: { wood_sword: 1 }
    effect: { remove_entity: skeleton }

  # ===== ACTION-TRIGGERED: crafting =====

  - action: make
    result: wood_pickaxe
    near: table
    requires: { wood: 1 }
    effect: { inventory: { wood_pickaxe: +1, wood: -1 } }

  - action: make
    result: stone_pickaxe
    near: table
    requires: { wood: 1, stone_item: 1 }
    effect: { inventory: { stone_pickaxe: +1, wood: -1, stone_item: -1 } }

  - action: make
    result: wood_sword
    near: table
    requires: { wood: 1 }
    effect: { inventory: { wood_sword: +1, wood: -1 } }

  # ===== ACTION-TRIGGERED: placement =====

  - action: place
    item: table
    near: empty
    requires: { wood: 2 }
    effect:
      world_place: { item: table, where: adjacent_empty }
      inventory: { wood: -2 }

  # ===== ACTION-TRIGGERED: self (sleep) =====

  - action: sleep
    effect: { body: { energy: +5 } }

  # ===== PASSIVE: background body decay =====
  # Measured from real Crafter via diag_crafter_mechanics.py:
  # food: -1 per ~26 steps ≈ -0.04/tick
  # drink: -1 per ~21 steps ≈ -0.05/tick (faster than I had)
  # energy: -1 per ~31 steps ≈ -0.033/tick

  - passive: body_rate
    variable: food
    rate: -0.04

  - passive: body_rate
    variable: drink
    rate: -0.05

  - passive: body_rate
    variable: energy
    rate: -0.033

  # ===== PASSIVE: entity movement =====

  - passive: movement
    entity: zombie
    behavior: chase_player

  - passive: movement
    entity: skeleton
    behavior: chase_player   # TODO: real skeleton kites at dist 3-5

  - passive: movement
    entity: cow
    behavior: random_walk

  # ===== PASSIVE: spatial damage =====
  # Values from Crafter source (objects.py):
  #
  # Zombie: damage 2 with cooldown 5 ticks when adjacent (dist ≤ 1).
  # Effective average: -2 / 6 ticks ≈ -0.33/tick.
  #
  # Skeleton: shoots ARROWS from range 3-5 (kiting enemy, not adjacent).
  # damage 2 per arrow, reload 4 ticks. Average: -2 / 5 ticks = -0.4/tick
  # while skeleton stays in the 3-5 range.

  - passive: spatial
    entity: zombie
    range: 1
    effect: { body: { health: -0.33 } }

  - passive: spatial
    entity: skeleton
    range: 5                           # arrow range, not adjacency
    effect: { body: { health: -0.4 } }

  # ===== PASSIVE: stateful body dynamics =====
  # Real Crafter _degen_or_regen_health (from objects.py):
  #   if all(food>0, drink>0, energy>0 or sleeping):
  #     recover += 1  (reaches +25 → HP +1 → avg +0.04/tick)
  #   else:
  #     recover -= 1  (reaches -15 → HP -1 → avg -0.067/tick)
  #
  # Our grammar doesn't support AND/OR conditions in `when` yet, so we
  # approximate by splitting additively across the three variables.
  # TODO: when grammar supports conjunction, replace with one rule:
  #   when: { and: [food>0, drink>0, energy>0] } → +0.04
  #   when: { or:  [food==0, drink==0, energy==0] } → -0.067
  #
  # Current approximation: each var contributes 1/3 of the full effect.
  # At all-3-on: 3 × 0.013 = 0.04 ✓
  # At any-at-0: −0.033 per var at 0, so 1 var → −0.033 (undershoot),
  #              2 vars → −0.067 ✓, 3 vars → −0.1 (overshoot).

  - passive: stateful
    when: { var: food, op: ">", value: 0 }
    effect: { body: { health: 0.013 } }

  - passive: stateful
    when: { var: drink, op: ">", value: 0 }
    effect: { body: { health: 0.013 } }

  - passive: stateful
    when: { var: energy, op: ">", value: 0 }
    effect: { body: { health: 0.013 } }

  - passive: stateful
    when: { var: food, op: "==", value: 0 }
    effect: { body: { health: -0.033 } }

  - passive: stateful
    when: { var: drink, op: "==", value: 0 }
    effect: { body: { health: -0.033 } }

  - passive: stateful
    when: { var: energy, op: "==", value: 0 }
    effect: { body: { health: -0.033 } }
