# Crafter Textbook — atomic causal rules
# Stage 71: Text-Visual Integration
#
# Format: only atomic facts. No chains, no prerequisites.
# The world model derives chains via backward chaining.
domain: crafter

vocabulary:
  # Visible objects (visually groundable)
  - { id: tree, category: resource }
  - { id: stone, category: resource }
  - { id: coal, category: resource }
  - { id: iron, category: resource }
  - { id: table, category: crafted }
  - { id: empty, category: terrain }
  - { id: zombie, category: enemy, dangerous: true }
  # Survival resources
  - { id: water, category: resource }
  - { id: cow, category: resource }
  # Inventory items (text grounding only)
  - { id: wood, category: item }
  - { id: stone_item, category: item }
  - { id: coal_item, category: item }
  - { id: iron_item, category: item }
  - { id: wood_pickaxe, category: tool }
  - { id: stone_pickaxe, category: tool }
  - { id: wood_sword, category: weapon }

rules:
  # Gathering
  - "do tree gives wood"
  - "do stone gives stone_item requires wood_pickaxe"
  - "do coal gives coal_item requires wood_pickaxe"
  - "do iron gives iron_item requires stone_pickaxe"
  # Crafting
  - "place table on empty requires wood and wood"
  - "make wood_pickaxe near table requires wood"
  - "make stone_pickaxe near table requires wood and stone_item"
  - "make wood_sword near table requires wood"
  # Combat
  - "do zombie with wood_sword kills zombie"
  - "zombie nearby without wood_sword means flee"
  # Survival
  - "do water restores drink"
  - "do cow restores food"
  - "sleep restores energy"
  # Indirect: in Crafter, food/drink > 0 regenerates HP passively.
  # Textbook teaches this as direct causality so restore_health plans exist.
  - "do cow restores health"
  - "do water restores health"

# Body rules — innate knowledge, how the body works (the "DNA")
# These initialize HomeostaticTracker conditional_rates before any experience.
# Like a baby knowing pain = bad. Not learned, pre-wired.
body:
  - { concept: _background, variable: food, rate: -0.04 }    # food depletes slowly
  - { concept: _background, variable: drink, rate: -0.04 }   # drink depletes slowly
  - { concept: _background, variable: energy, rate: -0.03 }  # energy depletes slowly
  - { concept: zombie, variable: health, rate: -2.0 }        # zombie hurts fast
