# Crafter Textbook — structured declarative facts
# Stage 77a: rewritten to structured YAML (Stage 71 was regex-parsed strings)
#
# Format: each rule is a dict with either `action` (agent-triggered) or
# `passive` (per-tick in simulation). See
# docs/superpowers/specs/2026-04-10-stage77a-conceptstore-forward-sim-design.md

domain: crafter

# Stage 82 migration (ideology-audit 2.1/2.2/2.3/2.6/2.9/2.10):
# cardinal move primitives with their (dx, dy) offsets. Before, every
# site that needed a facing direction duplicated the same
# if/elif chain in code. New envs override by declaring their own
# primitives block.
#
# `default_facing` is the offset used when last_action is None or
# not a move primitive (Crafter starts the agent facing down).
# `explore_cycle` is the order used by the exploration fallback
# when no preferred direction exists.
primitives:
  move_left:  { dx: -1, dy:  0 }
  move_right: { dx:  1, dy:  0 }
  move_up:    { dx:  0, dy: -1 }
  move_down:  { dx:  0, dy:  1 }

env_defaults:
  default_facing: [0, 1]  # dy=+1 means facing down
  explore_cycle: [move_up, move_right, move_down, move_left]

# Stage 82 (ideology-audit 1.4): env-level action dispatch semantics.
# Stage 79 Bug 2 debugged a fact the teacher could just declare:
# Crafter's "do" action interacts with the FACING tile, not any
# tile at manhattan ≤ 1, and even a blocked move still updates the
# facing direction. Declaring these here makes new envs pluggable
# (MiniGrid "pickup" is range=1 too but dispatch=proximity, etc).
env_semantics:
  do:
    dispatch: facing_tile      # one of: facing_tile | proximity
    range: 1                   # manhattan distance at which the action resolves
    interaction_mode: direct   # direct vs area vs projectile
  move:
    blocked_by: impassable     # impassable concepts stop the move
    updates_facing: true       # even a blocked move updates last_action/facing

vocabulary:
  # `blocking: true` means the player cannot walk THROUGH this tile.
  # Stage 82 migrated from `impassable_concepts()` heuristic in code —
  # teacher declares blocking semantics explicitly (ideology-audit 2.4).
  # Visible objects (visually groundable)
  - { id: tree,     category: resource, blocking: true }
  - { id: stone,    category: resource, blocking: true }
  - { id: coal,     category: resource, blocking: true }
  - { id: iron,     category: resource, blocking: true }
  - { id: table,    category: crafted,  blocking: true }
  - { id: empty,    category: terrain,  blocking: false }
  - { id: zombie,   category: enemy, dangerous: true, blocking: true }
  - { id: skeleton, category: enemy, dangerous: true, blocking: true }
  - { id: arrow,    category: projectile, dangerous: true, blocking: false }
  # Survival resources
  - { id: water, category: resource, blocking: true }
  - { id: cow,   category: resource, blocking: true }
  # Inventory items (text grounding only)
  - { id: wood,           category: item }
  - { id: stone_item,     category: item }
  - { id: coal_item,      category: item }
  - { id: iron_item,      category: item }
  - { id: wood_pickaxe,   category: tool }
  - { id: stone_pickaxe,  category: tool }
  - { id: wood_sword,     category: weapon }

body:
  prior_strength: 20
  variables:
    # `vital: true` means this variable hitting reference_min = death.
    # Non-vital vars can hit their min without terminating the episode
    # (e.g., food=0 is starvation, not instant death — health drops from it).
    - { name: health, initial: 9, reference_min: 0, reference_max: 9, vital: true }
    - { name: food,   initial: 9, reference_min: 0, reference_max: 9 }
    - { name: drink,  initial: 9, reference_min: 0, reference_max: 9 }
    - { name: energy, initial: 9, reference_min: 0, reference_max: 9 }

rules:
  # ===== ACTION-TRIGGERED: gathering =====

  - action: do
    target: tree
    effect: { inventory: { wood: +1 } }

  - action: do
    target: stone
    requires: { wood_pickaxe: 1 }
    effect: { inventory: { stone_item: +1 } }

  - action: do
    target: coal
    requires: { wood_pickaxe: 1 }
    effect: { inventory: { coal_item: +1 } }

  - action: do
    target: iron
    requires: { stone_pickaxe: 1 }
    effect: { inventory: { iron_item: +1 } }

  # ===== ACTION-TRIGGERED: consumption (body delta directly) =====

  - action: do
    target: cow
    effect: { body: { food: +5 } }

  - action: do
    target: water
    effect: { body: { drink: +5 } }

  # ===== ACTION-TRIGGERED: combat (scene_remove) =====

  - action: do
    target: zombie
    requires: { wood_sword: 1 }
    effect: { remove_entity: zombie }

  - action: do
    target: skeleton
    requires: { wood_sword: 1 }
    effect: { remove_entity: skeleton }

  # ===== ACTION-TRIGGERED: crafting =====

  - action: make
    result: wood_pickaxe
    near: table
    requires: { wood: 1 }
    effect: { inventory: { wood_pickaxe: +1, wood: -1 } }

  - action: make
    result: stone_pickaxe
    near: table
    requires: { wood: 1, stone_item: 1 }
    effect: { inventory: { stone_pickaxe: +1, wood: -1, stone_item: -1 } }

  - action: make
    result: wood_sword
    near: table
    requires: { wood: 1 }
    effect: { inventory: { wood_sword: +1, wood: -1 } }

  # ===== ACTION-TRIGGERED: placement =====

  - action: place
    item: table
    near: empty
    requires: { wood: 2 }
    effect:
      world_place: { item: table, where: adjacent_empty }
      inventory: { wood: -2 }

  # ===== ACTION-TRIGGERED: self (sleep) =====

  - action: sleep
    effect: { body: { energy: +5 } }

  # ===== PASSIVE: background body decay =====
  # ROUGH directional prior. The teacher knows "food depletes slowly", not
  # the exact rate. All three start at the same rough -0.02/tick (something
  # on the order of 1 per 50 ticks).
  #
  # Forward simulation reads `tracker.get_rate(var)` which Bayesian-combines
  # these innate priors with the agent's observed running mean. After ~20
  # episodes, sim predictions converge to the real env rates without the
  # textbook ever knowing the exact values.

  - passive: body_rate
    variable: food
    rate: -0.02

  - passive: body_rate
    variable: drink
    rate: -0.02

  - passive: body_rate
    variable: energy
    rate: -0.02

  # ===== PASSIVE: entity movement =====

  - passive: movement
    entity: zombie
    behavior: chase_player

  - passive: movement
    entity: skeleton
    behavior: chase_player

  - passive: movement
    entity: cow
    behavior: random_walk

  # ===== PASSIVE: spatial damage =====
  # Rough qualitative: "zombie hurts when adjacent" (strong damage),
  # "skeleton can hurt from a distance" (shoots).
  # The teacher knows the DIRECTION (damages health) and rough MAGNITUDE
  # (significant) and rough RANGE (skeleton farther than zombie). Exact
  # numbers come from observation, not from this textbook.
  #
  # TODO(Stage 77b): refine via observation-based rule learning. The agent
  # should learn via surprise when an entity at distance X causes damage Y.

  - passive: spatial
    entity: zombie
    range: 1
    effect: { body: { health: -0.5 } }

  - passive: spatial
    entity: skeleton
    range: 5
    effect: { body: { health: -0.5 } }

  - passive: spatial
    entity: arrow
    range: 1
    effect: { body: { health: -0.5 } }

  # ===== PASSIVE: stateful body dynamics =====
  # Rough directional facts:
  #   "when food > 0, health recovers slowly" — positive, small
  #   "when food is depleted (== 0), health drops" — negative, larger
  # (Same for drink, energy.)
  #
  # TODO(Stage 77b): conjunction support in `when` clause. Real Crafter
  # rule: `all three > 0 → heal, any == 0 → degen`. Currently approximated
  # per-var additively. See memory/project_stage77a_todo.md.

  - passive: stateful
    when: { var: food, op: ">", value: 0 }
    effect: { body: { health: 0.02 } }

  - passive: stateful
    when: { var: drink, op: ">", value: 0 }
    effect: { body: { health: 0.02 } }

  - passive: stateful
    when: { var: energy, op: ">", value: 0 }
    effect: { body: { health: 0.02 } }

  - passive: stateful
    when: { var: food, op: "==", value: 0 }
    effect: { body: { health: -0.05 } }

  - passive: stateful
    when: { var: drink, op: "==", value: 0 }
    effect: { body: { health: -0.05 } }

  - passive: stateful
    when: { var: energy, op: "==", value: 0 }
    effect: { body: { health: -0.05 } }

  # Stage 82 (ideology-audit 1.1): conjunctive stateful rule with
  # action_filter. Crafter's real dynamics include sleep + any-var
  # depleted → health drops faster than the per-var stateful rules
  # above would predict. Previously we spent Stage 78a / 78c / 79
  # asking the surprise nursery to rediscover this. With any_of + an
  # action_filter the teacher declares it directly.
  - passive: stateful
    when:
      action_filter: sleep
      any_of:
        - { var: food,   op: "==", value: 0 }
        - { var: drink,  op: "==", value: 0 }
        - { var: energy, op: "==", value: 0 }
    effect: { body: { health: -0.067 } }

goals:
  primary: survive
